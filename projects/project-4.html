<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #f4f7fd;
            color: #333;
        }
        #wrapper {
            max-width: 420px;
            margin: 60px auto;
            padding: 30px;
            background: white;
            border-radius: 14px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.12);
        }
        #wrapper h1 {
            margin-top: 0;
            text-align: center;
            color: #2b2b5d;
        }
        #wrapper p {
            line-height: 1.6;
            color: #555;
        }
        .form {
            margin-top: 20px;
            display: grid;
            gap: 14px;
        }
        #guess {
            font-weight: 700;
            color: #333;
        }
        .guessField {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ced4da;
            border-radius: 8px;
            font-size: 16px;
        }
        .guessSubmit {
            padding: 12px 16px;
            background: linear-gradient(135deg, #ff69b4, #ffd700);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .guessSubmit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 105, 180, 0.25);
        }
        .resultParas {
            margin-top: 24px;
            padding: 18px;
            background: #f9f9ff;
            border-radius: 10px;
            border: 1px solid #e6e9f2;
        }
        .resultParas p {
            margin: 10px 0;
            font-size: 15px;
        }
        .lowOrHi {
            font-weight: 700;
            color: #d63384;
        }
    </style>
</head>
<body>

    <div id="wrapper">
        <h1>Guess the number</h1>
        <p>Try and guess a random number between 1 to 100</p>
        <P>you have 10 attempts to guess the right number</P>
        <br>
        <form class="form">
            <label for="guessField" id="guess"> Guess a number</label>
            <input type="text" id="guessField" class="guessField">
            <input type="submit" value="Submit guess" id="subt" class="guessSubmit">
        </form>

        <div class="resultParas">
            <p>Previous Guesses: <span class="guesses"></span></p>
            <p>Guesses Remaining: <span class="lastResult">10</span></p>
            <p class="lowOrHi"></p>
        </div>
    </div>

    
    <script src="project-4.js"></script>
</body>
</html>
