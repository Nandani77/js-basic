<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .center {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            background: linear-gradient(135deg, #ff69b4 0%, #ffff00 100%);
            font-family: 'Arial', sans-serif;
        }
        #banner {
            background-color: rgba(255, 255, 255, 0.2);
            padding: 20px 40px;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        #banner span {
            color: white;
            font-size: 24px;
            font-weight: bold;
        }
        #clock {
            font-size: 48px;
            font-weight: bold;
            color: white;
            background-color: rgba(0, 0, 0, 0.3);
            padding: 30px 50px;
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            min-width: 300px;
            text-align: center;
        }
    </style>

<body>
    <div class="center">
        <div id="banner"><span>Your Local Time</span></div>
        <div id="clock"></div>
    </div>

    <script src="project-3.js"></script>
    
</body>
</html>
