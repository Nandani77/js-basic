<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            background-color: #f9f9f9;
            font-family: Arial, sans-serif;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        form p {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            background-color: #45a049;
        }
        #result {
            margin-top: 20px;
            padding: 10px;
            background-color: #e7f3fe;
            border-left: 5px solid #2196F3;
            font-weight: bold;
        }
        #weight-guide {
            margin-top: 20px;
            border-top: 1px solid #ccc;
            padding-top: 10px;
        }
        #weight-guide h3 {
            margin-bottom: 10px;
            color: #555;
        }
        #weight-guide p {
            margin: 5px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>BMI calculator</h1>
        <form>
            <p><label>Height in CM: </label>
            <input type="text" id="height" name="height"></p>
            <p><label>Weight in KG: </label>
            <input type="text" id="weight" name="weight"></p>
            <button type="submit">Calculate BMI</button>

            <div id="result"></div>
            <div id="weight-guide">
                <h3>Weight Guide</h3>
                <p>Underweight: BMI less than 18.5</p>
                <p>Normal weight: BMI 18.5–24.9</p>
                <p>Overweight: BMI 25–29.9</p>
            </div>
        </form>

    </div>

    <script src="project-2.js"></script>
    
</body>
</html>
